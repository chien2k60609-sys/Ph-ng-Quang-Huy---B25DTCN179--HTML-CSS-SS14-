<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>

    <ul id="product-list"></ul>

    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit">Thêm Sản Phẩm</button>
    </form>

    <script>
        const products = [
            { id: 1, name: "Bánh Chưng", price: 150000 },
            { id: 2, name: "Giò Lụa", price: 180000 },
            { id: 3, name: "Cành Đào", price: 500000 },
            { id: 4, name: "Mứt Tết", price: 120000 },
            { id: 5, name: "Bao Lì Xì", price: 25000 },
            { id: 6, name: "Dưa Hấu Tết", price: 80000 },
        ];

        const productList = document.getElementById("product-list");

        function addProductToDOM(name, price) {
            const newLi = document.createElement("li");
            newLi.className = "product-item";
            newLi.innerHTML = `
                <div class="product">
                    <strong>${name}</strong>
                    <p>Giá tiền: ${Number(price).toLocaleString()} VND</p>
                    <button class="delete-btn">Xóa</button>
                </div>
            `;

            const deleteBtn = newLi.querySelector(".delete-btn");
            deleteBtn.addEventListener("click", function () {
                const isConfirmed = confirm("Bạn có chắc muốn xóa sản phẩm này?");
                if (isConfirmed) {
                    newLi.remove();
                }
            });

            productList.appendChild(newLi);
        }

        products.forEach(product => {
            addProductToDOM(product.name, product.price);
        });

        const productForm = document.getElementById("product-form");

        productForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const nameInput = document.getElementById("product-name").value;
            const priceInput = document.getElementById("product-price").value;

            if (nameInput === "" || priceInput === "") {
                alert("Vui lòng nhập đầy đủ tên và giá sản phẩm!");
                return;
            }

            addProductToDOM(nameInput, priceInput);

            document.getElementById("product-name").value = "";
            document.getElementById("product-price").value = "";
        });
    </script>
</body>

</html>
